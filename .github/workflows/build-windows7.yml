name: Build llama.cpp (Windows 7 SP1 Compatible)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows7:
    runs-on: windows-2022
    name: Build for Windows 7 SP1 (MinGW)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64
          version: 13.2.0

      - name: Configure CMake (MinGW, Windows 7 compatible)
        shell: bash
        run: |
          cmake -B build -G "MinGW Makefiles" \
            -DCMAKE_SYSTEM_VERSION=6.1 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_STATIC=ON \
            -DLLAMA_NATIVE=OFF \
            -DLLAMA_AVX=ON \
            -DLLAMA_AVX2=OFF \
            -DLLAMA_FMA=OFF \
            -DLLAMA_F16C=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_TESTS=OFF

      - name: Build
        shell: bash
        run: cmake --build build --config Release -j 4

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-windows7-mingw
          path: |
            build/bin/*.exe
