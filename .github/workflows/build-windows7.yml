name: Build llama.cpp (Windows 7 SP1 Compatible)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows7:
    runs-on: windows-2022
    name: Build for Windows 7 SP1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake (Windows 7 compatible)
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_SYSTEM_VERSION=6.1 `
            -DCMAKE_C_FLAGS="/D_WIN32_WINNT=0x0601 /DWINVER=0x0601" `
            -DCMAKE_CXX_FLAGS="/D_WIN32_WINNT=0x0601 /DWINVER=0x0601 /EHsc" `
            -DBUILD_SHARED_LIBS=OFF `
            -DLLAMA_STATIC=ON `
            -DLLAMA_NATIVE=OFF `
            -DLLAMA_AVX=ON `
            -DLLAMA_AVX2=OFF `
            -DLLAMA_FMA=OFF `
            -DLLAMA_F16C=OFF

      - name: Build Release
        run: cmake --build build --config Release -j 4

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-windows7
          path: |
            build/bin/Release/*.exe
            build/bin/Release/*.dll
