name: Build llama.cpp (Windows 7 / Ubuntu 20.04 Compatible)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows7:
    runs-on: windows-2022
    name: Build for Windows 7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC with v141_xp toolset
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.16
          arch: x64

      - name: Configure CMake (Windows 7 compatible)
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_SYSTEM_VERSION=6.1 `
            -DCMAKE_CXX_COMPILER_TARGET=x86_64-pc-windows-msvc `
            -DCMAKE_C_COMPILER_TARGET=x86_64-pc-windows-msvc `
            -T v141_xp `
            -DBUILD_SHARED_LIBS=OFF `
            -DLLAMA_STATIC=ON `
            -DLLAMA_NATIVE=OFF `
            -DLLAMA_AVX=ON `
            -DLLAMA_AVX2=OFF `
            -DLLAMA_FMA=OFF `
            -DLLAMA_F16C=OFF

      - name: Build Release
        run: cmake --build build --config Release -j 4

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-windows7
          path: |
            build/bin/Release/*.exe
            build/bin/Release/*.dll

  build-ubuntu2004:
    runs-on: ubuntu-22.04
    name: Build for Ubuntu 20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ubuntu 20.04 build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-9 g++-9 build-essential cmake
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-9 90
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-9 90

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc-9 \
            -DCMAKE_CXX_COMPILER=g++-9 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_STATIC=ON \
            -DLLAMA_NATIVE=OFF

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-ubuntu2004
          path: build/bin/*
